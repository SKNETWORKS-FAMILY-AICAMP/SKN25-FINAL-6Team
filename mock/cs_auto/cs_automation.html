.login-overlay {
  position: fixed;

  z-index: 200;

.login-body { padding: 22px 24px; }
.lf-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.lf-label {
  display: block;
  margin-bottom: 5px;
  color: #4a5568;
  font-size: 11px;
  font-weight: 600;

.login-err {

function getSelectedTicket() {

function getReviewerInitials(id) {
  return (id || "")
    .replace(/[^a-zA-Z0-9가-힣]/g, "")
    .slice(0, 2)
    .toUpperCase() || "OP";
}

function showLoginError(message) {
  const err = document.getElementById("li-err");
  if (!err) return;
  err.classList.add("show");
  err.innerHTML = `<i class="ti ti-alert-circle" aria-hidden="true"></i> ${escapeHtml(message)}`;
}

function doLogin() {
  const idInput = document.getElementById("li-id");
  const pwInput = document.getElementById("li-pw");
  const roleInput = document.getElementById("li-role");
  if (!idInput || !pwInput || !roleInput) return;

  const id = idInput.value.trim();
  const pw = pwInput.value;
  const role = roleInput.value;
  const err = document.getElementById("li-err");

  if (!id) {
    showLoginError("운영자 ID를 입력하세요.");
    return;
  }

  if (DEMO_ACCOUNTS[id] === undefined || DEMO_ACCOUNTS[id] !== pw) {
    showLoginError("ID 또는 비밀번호가 올바르지 않습니다.");
    return;
  }

  if (err) {
    err.classList.remove("show");
  }
  appState.currentReviewer = id;
  appState.currentReviewerRole = role;
  render();
}

function doLogout() {
  appState.currentReviewer = null;
  appState.currentReviewerRole = "일반 운영자";
  render();
}

function toggleOpMenu(event) {
  event.stopPropagation();
  const dropdown = document.getElementById("op-dropdown");
  if (dropdown) {
    dropdown.classList.toggle("open");
  }
}

function ensureOperatorMenuListener() {
  if (operatorMenuListenerBound) return;
  document.addEventListener("click", () => {
    const dropdown = document.getElementById("op-dropdown");
    if (dropdown) {
      dropdown.classList.remove("open");
    }
  });
  operatorMenuListenerBound = true;
}

function badgeClassByTone(tone) {
  if (tone === "urgent") return "border border-brand-300 bg-brand-100 text-brand-700";
  if (tone === "review") return "border border-brand-200 bg-brand-500/10 text-brand-700";
  if (tone === "pending") return "border border-sand-300 bg-sand-100 text-ink-700";
  if (tone === "done") return "border border-brand-200 bg-brand-50 text-brand-700";
  return "bg-brand-500/10 text-brand-500";
}

function levelClass(level) {
  if (level === "HIGH") return "bg-alert-redBg text-alert-red";
  if (level === "MID") return "bg-alert-amberBg text-alert-amber";
  return "bg-brand-500/10 text-brand-500";
}

function riskSignalEmoji(level) {
  if (level === "HIGH") return "🔴";
  if (level === "MID") return "🟡";
  return "🟢";
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function nl2br(value) {
  return escapeHtml(value).replaceAll("\n", "<br>");
}

    `${ticket.nickname}님, 요청하신 사항을 정상 접수했습니다. ${reason} 사유를 반영해 관련 이력과 운영 기준을 다시 검토한 뒤 필요한 조치를 안내드리겠습니다.`
  ];
  return variants[Math.min(ticket.regenCount - 1, variants.length - 1)];
}

function getAnswerWorkflowStage() {
  if (!appState.workflowVisible) {
    return 3;
  }
  if (appState.workflowProgress >= 80) {
    return 3;
  }
  if (appState.workflowProgress >= 60) {
    return 2;
  }
  if (appState.workflowProgress >= 20) {
    return 1;
  }
  return 0;
}

function renderTimelineItem(label, state, terminal = false) {
  const bubbleClass = state === "done"
    ? "bg-alert-greenBg text-alert-green"
    : state === "active"
      ? "bg-brand-500/15 text-brand-500"
      : "border border-sand-300 bg-sand-100 text-ink-500";
  const iconMarkup = state === "done"
    ? '<i class="ti ti-check text-[10px]"></i>'
    : state === "active"
      ? '<i class="ti ti-loader-2 text-[10px]"></i>'
      : "•";
  const textClass = state === "done"
    ? "text-ink-700"
    : state === "active"
      ? "font-medium text-brand-500"
      : "text-ink-500";
  const connectorClass = state === "done" ? "bg-alert-green" : "bg-sand-300";

  return `
    <div class="flex items-center gap-2.5"><div class="flex h-[22px] w-[22px] items-center justify-center rounded-full ${bubbleClass}">${iconMarkup}</div><span class="text-[11px] ${textClass}">${label}</span></div>
    ${terminal ? "" : `<div class="ml-[9px] h-[13px] w-0.5 ${connectorClass}"></div>`}
  `;
}

function updateTicketHistory(ticket, decision, tone, reason) {
  appState.history = [
    { decision, tone, reviewer: appState.currentReviewer || "system", reason, time: timeStampLabel() },
    ...appState.history
  ];
  ticket.lastAction = reason;
}

function confirmDraft() {
  const ticket = getSelectedTicket();
  if (!ticket.isDraftEditing) {
    ticket.isDraftEditing = true;
    render();
    return;
  }

  ticket.isDraftEditing = false;
  ticket.draftStatus = "confirmed";
  ticket.confirmedDraft = ticket.draft;
  ticket.status = "review";
  ticket.priorityTone = "review";
  ticket.priorityLabel = "검토 중";
  ticket.statusText = `${appState.currentReviewer || "reviewer"} 검토 확정`;
  updateTicketHistory(ticket, "확정", "review", "AI 답변 초안 수정 후 확정");
  render();
}

function approveDraft() {
  const ticket = getSelectedTicket();
  ticket.isDraftEditing = false;
  ticket.draftStatus = "approved";
  ticket.approvedDraft = ticket.draft;
  ticket.status = "done";
  ticket.priorityTone = "done";
  ticket.priorityLabel = "완료";
  ticket.statusText = `${appState.currentReviewer || "reviewer"} 승인 완료`;
  updateTicketHistory(ticket, "승인", "done", "AI 답변 초안 바로 승인");
  render();
}

function requestRegenerateDraft() {
  const ticket = getSelectedTicket();
  if ((ticket.regenCount || 0) >= (ticket.regenLimit || 3)) {
    return;
  }

  appState.showRegenBox = !appState.showRegenBox;
  if (!appState.showRegenBox) {
    appState.regenReason = "";
  }
  render();
}

function regenerateDraft() {
  const ticket = getSelectedTicket();
  const reason = appState.regenReason.trim();
  if ((ticket.regenCount || 0) >= (ticket.regenLimit || 3) || !reason) {
    return;
  }

  ticket.regenCount = (ticket.regenCount || 0) + 1;
  ticket.isDraftEditing = false;
  ticket.draftStatus = "draft";
  ticket.status = "review";
  ticket.priorityTone = "review";
  ticket.priorityLabel = "검토 중";
  ticket.statusText = `${appState.currentReviewer || "reviewer"} 재생성 검토 중`;
  updateTicketHistory(ticket, "재생성", "pending", `재생성 ${ticket.regenCount}회 · 사유: ${reason}`);
  appState.showRegenBox = false;
  appState.regenReason = "";
  startWorkflow(() => {
    ticket.draft = getDraftRegenerationText(ticket, reason);
    ticket.lastGeneratedAt = timeStampLabel();
    render();
  });
}

function getReviewedTickets() {
  if (!appState.currentReviewer) {
    return [];
  }
  return appState.tickets.filter((ticket) => ticket.assignee === appState.currentReviewer);
}

function getTicketListPagination() {
  const pageSize = 4;
  const totalPages = Math.max(Math.ceil(appState.tickets.length / pageSize), 1);
  const currentPage = Math.min(Math.max(appState.ticketListPage, 1), totalPages);
  const startIndex = (currentPage - 1) * pageSize;
  return {
    currentPage,
    totalPages,
    tickets: appState.tickets.slice(startIndex, startIndex + pageSize)
  };
}

function formatReviewDateLabel(createdAt) {
  const [monthDay] = String(createdAt).split(" ");
  const [month, day] = monthDay.split("-").map(Number);
  const date = new Date(2026, (month || 1) - 1, day || 1);
  const weekdays = ["일", "월", "화", "수", "목", "금", "토"];
  return `${String(month).padStart(2, "0")}.${String(day).padStart(2, "0")} ${weekdays[date.getDay()]}요일`;
}

function getReviewHistorySidebarGroups() {
  const groups = new Map();
  getReviewedTickets().forEach((ticket) => {
    const key = String(ticket.createdAt).split(" ")[0];
    if (!groups.has(key)) {
      groups.set(key, []);
    }
    groups.get(key).push(ticket);
  });

  return Array.from(groups.entries())
    .sort((a, b) => b[0].localeCompare(a[0]))
    .map(([dateKey, tickets]) => ({
      dateKey,
      dateLabel: formatReviewDateLabel(dateKey),
      tickets
    }));
}

function getReviewSelectedDateKey() {
  if (appState.reviewSelectedDate) {
    return appState.reviewSelectedDate;
  }
  const selectedTicket = getReviewedTickets().find((ticket) => ticket.id === appState.selectedTicketId);
  if (selectedTicket) {
    return String(selectedTicket.createdAt).split(" ")[0];
  }
  return getReviewHistorySidebarGroups()[0]?.dateKey || null;
}

function syncReviewCalendarState() {
  const selectedDateKey = getReviewSelectedDateKey();
  if (!selectedDateKey) {
    return;
  }
  const [month] = selectedDateKey.split("-").map(Number);
  if (!appState.reviewCalendarYear) {
    appState.reviewCalendarYear = 2026;
  }
  if (!appState.reviewCalendarMonth) {
    appState.reviewCalendarMonth = month || 5;
  }
}

function getReviewCalendarEvents() {
  return getReviewedTickets().map((ticket) => ({
    title: ticket.title,
    start: `2026-${String(ticket.createdAt).split(" ")[0]}`,
    allDay: true,
    extendedProps: {
      ticketId: ticket.id
    }
  }));
}

function formatDateToIsoLocal(date) {
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, "0");
  const day = String(date.getDate()).padStart(2, "0");
  return `${year}-${month}-${day}`;
}

function initReviewHistoryCalendar() {
  const calendarRoot = document.getElementById("review-history-calendar");
  if (!calendarRoot || typeof FullCalendar === "undefined") {
    return;
  }

  if (reviewCalendarInstance) {
    reviewCalendarInstance.destroy();
    reviewCalendarInstance = null;
  }

  reviewCalendarInstance = new FullCalendar.Calendar(calendarRoot, {
    initialView: "dayGridMonth",
    locale: "ko",
    height: "auto",
    fixedWeekCount: false,
    headerToolbar: {
      left: "prev",
      center: "title",
      right: "next"
    },
    initialDate: `${appState.reviewCalendarYear}-${String(appState.reviewCalendarMonth).padStart(2, "0")}-01`,
    events: getReviewCalendarEvents(),
    dayMaxEventRows: 0,
    dayCellContent(args) {
      return String(args.date.getDate());
    },
    dayCellDidMount(args) {
      const selectedDateKey = getReviewSelectedDateKey();
      const selectedDateStr = selectedDateKey ? `2026-${selectedDateKey}` : "";
      if (formatDateToIsoLocal(args.date) === selectedDateStr) {
        args.el.classList.add("review-selected-day");
      }
    },
    dateClick(info) {
      if (info.dateStr.startsWith("2026-")) {
        appState.reviewSelectedDate = info.dateStr.slice(5);
        const targetTicket = getReviewedTickets().find((ticket) => `2026-${String(ticket.createdAt).split(" ")[0]}` === info.dateStr);
        if (targetTicket) {
          appState.selectedTicketId = targetTicket.id;
        }
        render();
      }
    },
    datesSet(info) {
      const currentDate = info.view.currentStart;
      appState.reviewCalendarYear = currentDate.getFullYear();
      appState.reviewCalendarMonth = currentDate.getMonth() + 1;
      const yearSelect = document.getElementById("review-calendar-year");
      const monthSelect = document.getElementById("review-calendar-month");
      if (yearSelect) {
        yearSelect.value = String(appState.reviewCalendarYear);
      }
      if (monthSelect) {
        monthSelect.value = String(appState.reviewCalendarMonth);
      }
    }
  });

  reviewCalendarInstance.render();
}

            <span class="text-[10px] text-ink-500">${ticketListPagination.currentPage}/${ticketListPagination.totalPages}페이지</span>
            <button id="ticket-page-next-btn" class="btn btn-ghost btn-sm px-2 py-0.5" ${ticketListPagination.currentPage === ticketListPagination.totalPages ? "disabled" : ""}><i class="ti ti-chevron-right"></i></button>
          </div>
        </div>
        <div class="mt-auto border-t border-sand-300 px-3 pt-2.5">
          <div class="mb-1 px-1 text-[10px] uppercase tracking-[0.08em] text-ink-500">외부 채널</div>
          <div class="mb-1 flex items-center gap-2 rounded-lg border border-sand-300 bg-sand-100 px-2.5 py-1.5 text-xs text-ink-700">
            <i class="ti ti-mail text-sm text-brand-300" aria-hidden="true"></i> 이메일 확인
          </div>
          <div class="mb-1 flex items-center gap-2 rounded-lg border border-sand-300 bg-sand-100 px-2.5 py-1.5 text-xs text-ink-700">
            <i class="ti ti-brand-blogger text-sm text-brand-300" aria-hidden="true"></i> 네이버 카페
            <i class="ti ti-external-link ml-auto text-[11px] text-brand-200" aria-hidden="true"></i>
          </div>
        </div>
      `}
    </aside>

    <main class="flex min-h-0 flex-col overflow-y-auto bg-white">
      ${appState.activeTopTab === "검토 이력" ? renderReviewHistoryContent() : `
      <div class="relative min-h-0 flex-1 overflow-y-auto bg-white pr-8 pl-4 pb-3.5 pt-3.5">
        ${appState.isTicketSidebarOpen ? `<button id="ticket-sidebar-backdrop" class="absolute inset-0 z-10 bg-ink-900/20"></button>` : ""}
        <div class="section-head rounded-t-xl bg-white">
            <div class="min-w-0 flex-1">
              <h3 class="text-[18px] font-semibold leading-[1.3] text-ink-900">${ticket.title}</h3>
              <div class="mt-1.5 flex flex-wrap items-center gap-2 text-[11px] text-ink-500">
                <span>#${ticket.id}</span>
                <span>|</span>
                <span>${ticket.createdAt}</span>
                <span>|</span>
                <span>${ticket.nickname}</span>
                <span>|</span>
                <span>${ticket.channel}</span>
              </div>
            </div>
        </div>

          <div class="flex flex-col gap-2.5 bg-white p-3">
            <div class="flex flex-col gap-2.5">
              <div class="subcard subcard-editable">
                <div class="subcard-head">
                  <div class="flex items-center gap-1.5 text-xs font-bold text-ink-900"><i class="ti ti-ticket text-sm text-brand-500"></i> 문의 정보</div>
                </div>
                <div class="subcard-body">
                  <div class="text-xs leading-[1.8] text-ink-700">${ticket.body}</div>
                </div>
              </div>

              <div class="grid grid-cols-[1fr_172px] gap-2.5">
                <div class="subcard">
                  <div class="subcard-head">
                    <div class="flex items-center gap-1.5 text-xs font-bold text-ink-900">
                      <i class="ti ti-message-2 text-sm text-brand-500"></i> 답변 초안
                    </div>
                    <div class="flex items-center gap-1.5">
                      <span class="text-[10px] text-ink-500">재생성 ${ticket.regenCount || 0}/${ticket.regenLimit || 3}</span>
                    </div>
                  </div>
                  <div class="subcard-body">
                    <textarea id="draft-input" class="min-h-[180px] w-full resize-y rounded-[7px] border border-sand-300 bg-white px-3 py-2.5 text-xs leading-[1.6] text-ink-900 outline-none ${ticket.isDraftEditing ? "focus:border-brand-500" : "text-ink-500"}" ${ticket.isDraftEditing ? "" : "readonly"}>${escapeHtml(ticket.draft)}</textarea>
                    <div class="mt-2 flex flex-wrap gap-1.5">
                      <button id="confirm-draft-btn" class="btn btn-ghost btn-sm"><i class="ti ti-device-floppy"></i> ${ticket.isDraftEditing ? "수정 완료" : "수정"}</button>
                      <button id="regen-toggle-btn" class="btn btn-ghost btn-sm ml-auto ${remainingRegens === 0 ? "cursor-not-allowed opacity-40 hover:border-sand-300 hover:text-ink-700" : ""}" ${remainingRegens === 0 ? "disabled" : ""}><i class="ti ti-refresh"></i> 재생성</button>
                    </div>
                    <div class="${appState.showRegenBox ? "block" : "hidden"} mt-2 rounded-lg border border-brand-200 bg-brand-500/5 p-3">
                      <label class="mb-1 block text-[11px] font-medium text-brand-500">재생성 사유 입력</label>
                      <textarea id="regen-reason-input" class="min-h-[52px] w-full resize-none rounded-md border border-brand-200 bg-white px-2.5 py-2 text-xs outline-none" placeholder="예: 문체를 더 정중하게 수정, 환불 기준 문구 반영">${escapeHtml(appState.regenReason)}</textarea>
                      <div class="mt-1.5 flex gap-1">
                        <button id="regen-submit-btn" class="btn btn-primary btn-sm"><i class="ti ti-send"></i> 사유 반영 재생성</button>
                        <button id="regen-cancel-btn" class="btn btn-ghost btn-sm">취소</button>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="subcard">
                  <div class="subcard-head">
                    <div class="flex items-center gap-1.5 text-xs font-bold text-ink-900"><i class="ti ti-activity text-sm text-brand-500"></i> 처리 현황</div>
                  </div>
                  <div class="subcard-body px-2.5 py-2.5">
                    <div class="flex flex-col gap-0">
                      ${renderTimelineItem("AI 분석 완료", answerWorkflowStage > 1 ? "done" : answerWorkflowStage === 1 ? "active" : "pending")}
                      ${renderTimelineItem("초안 생성", answerWorkflowStage > 2 ? "done" : answerWorkflowStage === 2 ? "active" : "pending")}
                      ${renderTimelineItem("검토 중", ticket.status === "done" ? "done" : answerWorkflowStage === 3 ? "active" : "pending")}
                      ${renderTimelineItem("발송", ticket.status === "done" ? "done" : "pending", true)}
                    </div>
                    <div class="mt-3 flex flex-col gap-1.5">
                      <button id="complete-answer-btn" class="btn btn-primary btn-sm w-full justify-center"><i class="ti ti-check"></i> 답변 완료</button>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="subcard">
              <div class="subcard-head">
                <div class="flex items-center gap-1.5 text-xs font-bold text-ink-900"><i class="ti ti-stack-2 text-sm text-brand-500"></i> 참고 정보</div>
                <div class="flex flex-wrap items-center gap-1">
                  <span class="badge border border-sand-300 bg-white text-ink-700">${ticket.risk} ${riskSignalEmoji(ticket.risk)}</span>
                  <span class="badge border border-sand-300 bg-white text-ink-700">근거 🟢</span>
                  <span class="badge border border-sand-300 bg-white text-ink-700">주의 🟡</span>
                  <span class="badge border border-sand-300 bg-white text-ink-700">정책 🟢</span>
                </div>
              </div>
              <div class="subcard-body flex flex-col gap-4">
                <div>
                  <div class="mb-1.5 text-[11px] font-semibold text-ink-900">AI 분석 및 안전성 검토</div>
                  <div class="space-y-2 text-xs leading-[1.8] text-ink-700">
                    <p>${ticket.aiSummary}</p>
                    <p>관련 내용은 ${ticket.route} 유형으로 분류되며, ${ticket.direction} 방향으로 처리하는 것이 적절합니다. 현재 위험도는 ${ticket.risk}로 판단됩니다.</p>
                    <p>안전성 검토 결과 근거 일치는 통과했고, 환각 가능성은 주의 1건 수준이며, 정책 위반이나 부정 표현은 확인되지 않았습니다.</p>
                  </div>
                </div>

                <div>
                  <div class="mb-1.5 text-[11px] font-semibold text-ink-900">
                    <span>답변 근거</span>
                  </div>
                  <div class="overflow-hidden rounded-[7px] border border-sand-300 bg-white">
                    <div class="grid grid-cols-[180px_minmax(0,1fr)] border-b border-sand-300 bg-sand-100 px-2.5 py-1.5 text-[10px] font-semibold uppercase tracking-[0.08em] text-ink-500">
                      <div>문서</div>
                      <div>근거 내용</div>
                    </div>
                    ${appState.evidence.map((item) => `
                      <div class="grid grid-cols-[180px_minmax(0,1fr)] border-b border-sand-300 px-2.5 py-2 text-[10px] leading-[1.55] text-ink-700 last:border-b-0">
                        <div class="pr-2 font-medium">${item.source}</div>
                        <div>${item.body}</div>
                      </div>
                    `).join("")}
                  </div>
                </div>
              </div>
            </div>
          </div>

        <aside class="hidden absolute right-0 top-2.5 z-20 grid h-[380px] w-[332px] grid-cols-[28px_1fr] overflow-hidden rounded-l-xl border border-sand-300 bg-white shadow-panel transition-transform duration-300 ${appState.isTicketSidebarOpen ? "translate-x-0" : "translate-x-[304px]"}">
          <button id="ticket-sidebar-handle-btn" class="flex h-full w-full flex-col items-center justify-center border-r border-sand-300 bg-sand-100 px-0.5 text-ink-700 transition hover:bg-sand-200 hover:text-ink-900">
            <span class="[writing-mode:vertical-rl] text-[10px] font-semibold tracking-[0.06em]">문의목록</span>
          </button>
          <div class="flex min-h-0 flex-col bg-white">
            <div class="section-head">
              <i class="ti ti-inbox text-base text-brand-500" aria-hidden="true"></i>
              <h3>문의 목록</h3>
              <button id="ticket-sidebar-close-btn" class="btn btn-ghost btn-sm"><i class="ti ti-x"></i> 닫기</button>
            </div>
            <div class="shrink-0 border-b border-sand-300 px-3 py-[7px]">
              <div class="relative">
                <i class="ti ti-search absolute left-2 top-1/2 -translate-y-1/2 text-sm text-brand-200" aria-hidden="true"></i>
                <input class="w-full rounded-[7px] border border-sand-300 bg-sand-100 py-1.5 pl-7 pr-2.5 text-xs text-ink-900 outline-none focus:border-brand-500 focus:bg-white" type="text" placeholder="유저명, 제목, ID 검색...">
              </div>
            </div>
            <div class="flex-1 overflow-y-auto p-2">
              ${appState.tickets.map((item) => `
                <button class="ticket-card w-full text-left ${appState.selectedTicketId === item.id ? "selected" : ""} ${item.priorityTone === "urgent" ? "border-l-[3px] border-l-alert-red" : ""} ${item.status === "done" ? "opacity-50" : ""}" data-ticket-id="${item.id}">
                  <div class="mb-1 flex items-center gap-1.5">
                    <span class="font-mono text-[10px] text-ink-500">#${item.id}</span>
                    <span class="badge ${badgeClassByTone(item.priorityTone)}">${item.priorityLabel}</span>
                    <span class="ml-auto flex items-center gap-1.5 text-[10px]">
                      <span class="${item.status === "done" ? "font-medium text-alert-green" : item.assignee === "미할당" ? "font-normal text-ink-500" : "font-semibold text-alert-amber"}">${item.statusText}</span>
                      <span class="text-ink-500">${item.timeAgo}</span>
                    </span>
                  </div>
                  <div class="mb-1 text-xs font-medium leading-[1.4] text-ink-900">${item.title}</div>
                  <div class="flex flex-wrap items-center gap-1">
                    <span class="badge border border-sand-300 bg-sand-100 text-ink-700">${item.channel}</span>
                    <span class="badge ${draftStatusMeta(item.draftStatus).chipClass}">${draftStatusMeta(item.draftStatus).label}</span>
                  </div>
                </button>
              `).join("")}
            </div>
          </div>
        </aside>
      </div>
      `}
    </main>
  `;

  const authSlot = document.getElementById("auth-slot");
  if (authSlot) {
    authSlot.innerHTML = renderAuthSlotHtml();
  }
  app.insertAdjacentHTML("beforeend", renderLoginOverlayHtml());

  bindEvents();
  if (appState.activeTopTab === "검토 이력") {
    initReviewHistoryCalendar();
  } else if (reviewCalendarInstance) {
    reviewCalendarInstance.destroy();
    reviewCalendarInstance = null;
  }
}

function bindEvents() {
  document.querySelectorAll("[data-top-tab]").forEach((button) => {
    button.addEventListener("click", () => {
      appState.activeTopTab = button.dataset.topTab;
      if (button.dataset.topTab === "검토 이력") {
        appState.reviewDetailVisible = false;
      }
      render();
    });
  });

  document.querySelectorAll("[data-side-tab]").forEach((button) => {
    button.addEventListener("click", () => {
      appState.activeSideTab = button.dataset.sideTab;
      render();
    });
  });

  document.querySelectorAll("[data-filter]").forEach((button) => {
    button.addEventListener("click", () => {
      appState.activeFilter = button.dataset.filter;
      render();
    });
  });

  document.querySelectorAll("[data-category]").forEach((button) => {
    button.addEventListener("click", () => {
      appState.activeCategory = button.dataset.category;
      render();
    });
  });

  document.querySelectorAll("[data-review-status]").forEach((button) => {
    button.addEventListener("click", () => {
      appState.reviewHistoryStatusFilter = button.dataset.reviewStatus;
      appState.reviewDetailVisible = false;
      render();
    });
  });

  document.querySelectorAll("[data-ticket-id]").forEach((button) => {
    button.addEventListener("click", () => {
      appState.selectedTicketId = button.dataset.ticketId;
      if (appState.activeTopTab === "검토 이력") {
        appState.reviewDetailVisible = true;
      }
      const ticketIndex = appState.tickets.findIndex((ticket) => ticket.id === button.dataset.ticketId);
      if (ticketIndex >= 0) {
        appState.ticketListPage = Math.floor(ticketIndex / 4) + 1;
      }
      appState.isTicketSidebarOpen = false;
      appState.showRegenBox = false;
      appState.regenReason = "";
      render();
    });
  });

  const reviewCalendarYear = document.getElementById("review-calendar-year");
  if (reviewCalendarYear) {
    reviewCalendarYear.addEventListener("change", (event) => {
      appState.reviewCalendarYear = Number(event.target.value);
      appState.reviewSelectedDate = "";
      if (reviewCalendarInstance) {
        reviewCalendarInstance.gotoDate(`${appState.reviewCalendarYear}-${String(appState.reviewCalendarMonth).padStart(2, "0")}-01`);
      }
      render();
    });
  }

  const reviewCalendarMonth = document.getElementById("review-calendar-month");
  if (reviewCalendarMonth) {
    reviewCalendarMonth.addEventListener("change", (event) => {
      appState.reviewCalendarMonth = Number(event.target.value);
      appState.reviewSelectedDate = "";
      if (reviewCalendarInstance) {
        reviewCalendarInstance.gotoDate(`${appState.reviewCalendarYear}-${String(appState.reviewCalendarMonth).padStart(2, "0")}-01`);
      }
      render();
    });
  }

  const ticketPagePrevBtn = document.getElementById("ticket-page-prev-btn");
  if (ticketPagePrevBtn) {
    ticketPagePrevBtn.addEventListener("click", () => {
      appState.ticketListPage = Math.max(appState.ticketListPage - 1, 1);
      render();
    });
  }

  const ticketPageNextBtn = document.getElementById("ticket-page-next-btn");
  if (ticketPageNextBtn) {
    ticketPageNextBtn.addEventListener("click", () => {
      const totalPages = Math.max(Math.ceil(appState.tickets.length / 4), 1);
      appState.ticketListPage = Math.min(appState.ticketListPage + 1, totalPages);
      render();
    });
  }

  const ticketSidebarHandleBtn = document.getElementById("ticket-sidebar-handle-btn");
  if (ticketSidebarHandleBtn) {
    ticketSidebarHandleBtn.addEventListener("click", () => {
      appState.isTicketSidebarOpen = !appState.isTicketSidebarOpen;
      render();
    });
  }

  const ticketSidebarCloseBtn = document.getElementById("ticket-sidebar-close-btn");
  if (ticketSidebarCloseBtn) {
    ticketSidebarCloseBtn.addEventListener("click", () => {
      appState.isTicketSidebarOpen = false;
      render();
    });
  }

  const ticketSidebarBackdrop = document.getElementById("ticket-sidebar-backdrop");
  if (ticketSidebarBackdrop) {
    ticketSidebarBackdrop.addEventListener("click", () => {
      appState.isTicketSidebarOpen = false;
      render();
    });
  }

  document.querySelectorAll("[data-evd-index]").forEach((button) => {
    button.addEventListener("click", () => {
      const index = Number(button.dataset.evdIndex);
      appState.evidence[index].open = !appState.evidence[index].open;
      render();
    });
  });

  const workflowBtn = document.getElementById("workflow-btn");
  if (workflowBtn) workflowBtn.addEventListener("click", startWorkflow);

  const confirmDraftBtn = document.getElementById("confirm-draft-btn");
  if (confirmDraftBtn) {
    confirmDraftBtn.addEventListener("click", confirmDraft);
  }

  const completeAnswerBtn = document.getElementById("complete-answer-btn");
  if (completeAnswerBtn) {
    completeAnswerBtn.addEventListener("click", approveDraft);
  }

  const regenToggleBtn = document.getElementById("regen-toggle-btn");
  if (regenToggleBtn) regenToggleBtn.addEventListener("click", requestRegenerateDraft);

  const regenCancelBtn = document.getElementById("regen-cancel-btn");
  if (regenCancelBtn) {
    regenCancelBtn.addEventListener("click", () => {
      appState.showRegenBox = false;
      appState.regenReason = "";
      render();
    });
  }

  const regenSubmitBtn = document.getElementById("regen-submit-btn");
  if (regenSubmitBtn) regenSubmitBtn.addEventListener("click", regenerateDraft);

  const loginBtn = document.getElementById("login-btn");
  if (loginBtn) {
    loginBtn.addEventListener("click", () => {
      const username = prompt("리뷰어 ID를 입력하세요", "reviewer_01");
      if (username && username.trim()) {
        appState.currentReviewer = username.trim();
        render();
      }
    });
  }

  const logoutBtn = document.getElementById("logout-btn");
  if (logoutBtn) {
    logoutBtn.addEventListener("click", () => {
      appState.currentReviewer = null;
      render();
    });
  }

  ensureOperatorMenuListener();

  const reviewLoginBtn = document.getElementById("review-login-btn");
  if (reviewLoginBtn) {
    reviewLoginBtn.addEventListener("click", () => {
      const overlay = document.getElementById("login-overlay");
      if (overlay) {
        overlay.classList.remove("hidden");
      }
    });
  }

  const loginSubmitBtn = document.getElementById("login-submit-btn");
  if (loginSubmitBtn) {
    loginSubmitBtn.addEventListener("click", doLogin);
  }

  const loginIdInput = document.getElementById("li-id");
  const loginPwInput = document.getElementById("li-pw");
  [loginIdInput, loginPwInput].forEach((input) => {
    if (input) {
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          doLogin();
        }
      });
    }
  });

  const opChipBtn = document.getElementById("op-chip-btn");
  if (opChipBtn) {
    opChipBtn.addEventListener("click", toggleOpMenu);
    opChipBtn.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        toggleOpMenu(event);
      }
    });
  }

  const reviewLogoutBtn = document.getElementById("review-logout-btn");
  if (reviewLogoutBtn) {
    reviewLogoutBtn.addEventListener("click", (event) => {
      event.stopPropagation();
      doLogout();
    });
  }

  const draftInput = document.getElementById("draft-input");
  if (draftInput) {
    draftInput.addEventListener("input", (event) => {
      const ticket = getSelectedTicket();
      ticket.draft = event.target.value;
    });
  }

  const regenReasonInput = document.getElementById("regen-reason-input");
  if (regenReasonInput) {
    regenReasonInput.addEventListener("input", (event) => {
      appState.regenReason = event.target.value;
    });
  }
}

function startWorkflow(onComplete) {
  appState.workflowVisible = true;
  appState.workflowProgress = 0;
  appState.workflowLabel = workflowSteps[0].label;
  render();

  let index = 0;
  const timer = setInterval(() => {
    if (index >= workflowSteps.length) {
      clearInterval(timer);
      if (typeof onComplete === "function") {
        onComplete();
      }
      return;
    }

    appState.workflowLabel = workflowSteps[index].label;
    appState.workflowProgress = workflowSteps[index].progress;
    render();
    index += 1;
  }, 700);
}

render();
</script>
</body>
</html>
