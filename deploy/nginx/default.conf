server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400;

    location = / {
        return 302 /dashboard/;
    }

    # Chatbot is excluded from the MVP Docker deployment until the real UI/API is implemented.
    # location = /chatbot {
    #     return 308 /chatbot/;
    # }
    #
    # location = /chatbot/api {
    #     return 308 /chatbot/api/;
    # }
    #
    # location ^~ /chatbot/api/ {
    #     proxy_pass http://chatbot-backend:8000/;
    # }
    #
    # location ^~ /chatbot/ {
    #     proxy_pass http://chatbot-frontend:8501/chatbot/;
    # }

    location = /operation {
        return 308 /operation/;
    }

    location = /operation/api {
        return 308 /operation/api/;
    }

    location ^~ /operation/api/ {
        proxy_pass http://operation-backend:8000/;
    }

    location ^~ /operation/ {
        proxy_pass http://operation-frontend:8501/operation/;
    }

    location = /dashboard {
        return 308 /dashboard/;
    }

    location = /dashboard/api {
        return 308 /dashboard/api/;
    }

    location ^~ /dashboard/api/ {
        proxy_pass http://dashboard-backend:8000/;
    }

    location ^~ /dashboard/ {
        proxy_pass http://dashboard-frontend:8501/dashboard/;
    }
}
